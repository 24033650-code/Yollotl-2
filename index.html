<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Yóllotl — Evaluación Cognitiva</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Fredoka+One&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ══════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; }
body {
  font-family:'DM Sans', sans-serif;
  background:#0a0e1a;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}
::-webkit-scrollbar        { width:6px; }
::-webkit-scrollbar-track  { background:transparent; }
::-webkit-scrollbar-thumb  { background:rgba(255,255,255,0.15); border-radius:3px; }

/* ══════════════════════════════════════════════
   ANIMACIONES
══════════════════════════════════════════════ */
@keyframes fadeIn  { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
@keyframes shake   { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
@keyframes pulse   { 0%,100%{opacity:1} 50%{opacity:.5} }
@keyframes bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes pop     { 0%{transform:scale(1)} 50%{transform:scale(1.18)} 100%{transform:scale(1)} }
@keyframes float   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
@keyframes glow    { 0%,100%{box-shadow:0 0 10px rgba(234,179,8,.3)} 50%{box-shadow:0 0 30px rgba(234,179,8,.7)} }

.animate-fadeIn { animation:fadeIn  .35s ease both; }
.animate-shake  { animation:shake   .4s  ease-in-out; }
.animate-pulse  { animation:pulse   1.5s infinite; }
.animate-bounce { animation:bounce  1s   infinite; }
.animate-pop    { animation:pop     .3s  ease; }
.animate-float  { animation:float   3s   ease-in-out infinite; }
.animate-glow   { animation:glow    2s   ease-in-out infinite; }

/* ══════════════════════════════════════════════
   GLASSMORPHISM
══════════════════════════════════════════════ */
.glass-dark {
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
  border-radius:20px;
}
.glass-light {
  background:rgba(255,255,255,.7);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.85);
  border-radius:20px;
  box-shadow:0 8px 32px rgba(139,92,246,.15);
}

/* ══════════════════════════════════════════════
   BOTONES
══════════════════════════════════════════════ */
.btn {
  display:inline-flex; align-items:center; justify-content:center;
  border:none; cursor:pointer;
  font-family:'DM Sans',sans-serif; font-weight:600;
  border-radius:14px; transition:all .2s ease;
  user-select:none; outline:none;
}
.btn:active   { transform:scale(.94); }
.btn:disabled { opacity:.45; cursor:not-allowed; transform:none !important; }

/* Adulto */
.btn-primary-adult   { background:linear-gradient(135deg,#d97706,#b45309); color:#000; box-shadow:0 4px 20px rgba(217,119,6,.35); }
.btn-primary-adult:hover:not(:disabled)   { box-shadow:0 6px 28px rgba(217,119,6,.55); transform:translateY(-1px); }
.btn-secondary-adult { background:rgba(255,255,255,.08); color:#fff; border:1px solid rgba(255,255,255,.18); }
.btn-secondary-adult:hover:not(:disabled) { background:rgba(255,255,255,.15); }
.btn-danger-adult    { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.3); }
.btn-ghost-adult     { background:transparent; color:rgba(255,255,255,.5); }
.btn-ghost-adult:hover:not(:disabled)     { color:#fff; background:rgba(255,255,255,.08); }

/* Infantil */
.btn-primary-child   { background:linear-gradient(135deg,#8b5cf6,#ec4899); color:#fff; box-shadow:0 4px 20px rgba(139,92,246,.4); }
.btn-primary-child:hover:not(:disabled)   { box-shadow:0 6px 28px rgba(236,72,153,.5); transform:translateY(-2px) scale(1.03); }
.btn-secondary-child { background:rgba(255,255,255,.8); color:#7c3aed; border:2px solid rgba(139,92,246,.4); }
.btn-secondary-child:hover:not(:disabled) { background:#fff; }
.btn-danger-child    { background:rgba(239,68,68,.15); color:#ef4444; border:1px solid rgba(239,68,68,.3); }
.btn-ghost-child     { background:transparent; color:#7c3aed; }
.btn-ghost-child:hover:not(:disabled)     { background:rgba(139,92,246,.1); }

/* Tamaños */
.btn-sm  { padding:7px 16px;  font-size:13px; }
.btn-md  { padding:11px 22px; font-size:15px; }
.btn-lg  { padding:15px 32px; font-size:17px; }
.btn-xl  { padding:18px 42px; font-size:20px; border-radius:18px; }

/* ══════════════════════════════════════════════
   LAYOUT
══════════════════════════════════════════════ */
.screen        { animation:fadeIn .3s ease both; padding-bottom:80px; }
.header-bar    { position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:12px 18px; backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); }
.header-adult  { background:rgba(10,14,26,.85); border-bottom:1px solid rgba(255,255,255,.08); }
.header-child  { background:rgba(255,255,255,.75); border-bottom:1px solid rgba(139,92,246,.2); }
.footer-bar    { position:fixed; bottom:0; left:0; right:0; text-align:center; padding:8px 16px; font-size:11px; line-height:1.4; z-index:99; }
.footer-adult  { background:rgba(10,14,26,.9);  color:rgba(255,255,255,.2); }
.footer-child  { background:rgba(255,255,255,.85); color:rgba(124,58,237,.5); }

/* ══════════════════════════════════════════════
   MÉTRICAS Y BARRA DE PROGRESO
══════════════════════════════════════════════ */
.metric-badge       { display:flex; flex-direction:column; align-items:center; padding:10px 14px; border-radius:14px; }
.metric-badge-adult { background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08); }
.metric-badge-child { background:rgba(255,255,255,.65); border:1px solid rgba(139,92,246,.15); }
.metric-val         { font-size:22px; font-weight:700; line-height:1; }
.metric-lbl         { font-size:11px; margin-top:4px; opacity:.55; }

.progress-track       { width:100%; height:6px; border-radius:99px; overflow:hidden; }
.progress-track-adult { background:rgba(255,255,255,.08); }
.progress-track-child { background:rgba(139,92,246,.15); }
.progress-fill        { height:100%; border-radius:99px; transition:width .4s ease; }
.progress-adult       { background:linear-gradient(90deg,#d97706,#fbbf24); }
.progress-child       { background:linear-gradient(90deg,#8b5cf6,#ec4899); }

/* ══════════════════════════════════════════════
   FEEDBACK
══════════════════════════════════════════════ */
.feedback-correct { background:rgba(34,197,94,.15)  !important; border-color:rgba(34,197,94,.4) !important; }
.feedback-error   { background:rgba(239,68,68,.15)  !important; border-color:rgba(239,68,68,.4) !important; }

/* ══════════════════════════════════════════════
   FONDOS TEMÁTICOS
══════════════════════════════════════════════ */
.child-bg { background:linear-gradient(135deg,#f0e6ff 0%,#fce7f3 40%,#e0f2fe 100%); min-height:100vh; }

/* ══════════════════════════════════════════════
   INPUTS
══════════════════════════════════════════════ */
.input-adult {
  background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.15);
  border-radius:14px; padding:12px 16px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:15px; outline:none; width:100%; transition:border-color .2s;
}
.input-adult::placeholder { color:rgba(255,255,255,.25); }
.input-adult:focus        { border-color:rgba(217,119,6,.6); }

.input-child {
  background:rgba(255,255,255,.8); border:2px solid rgba(139,92,246,.3);
  border-radius:14px; padding:12px 16px; color:#4c1d95;
  font-family:'DM Sans',sans-serif; font-size:16px; outline:none; width:100%; transition:border-color .2s;
}
.input-child::placeholder { color:rgba(139,92,246,.35); }
.input-child:focus        { border-color:#8b5cf6; }

/* ══════════════════════════════════════════════
   TABLA DE HISTORIAL
══════════════════════════════════════════════ */
.hist-table     { width:100%; border-collapse:collapse; font-size:13px; }
.hist-table th  { text-align:left; padding:8px 10px; font-size:11px; text-transform:uppercase; letter-spacing:.05em; border-bottom:1px solid rgba(255,255,255,.1); color:rgba(255,255,255,.4); }
.hist-table td  { padding:9px 10px; border-bottom:1px solid rgba(255,255,255,.04); color:rgba(255,255,255,.7); }
.hist-table-child th { border-bottom:1px solid rgba(139,92,246,.2); color:#7c3aed !important; }
.hist-table-child td { border-bottom:1px solid rgba(139,92,246,.08); color:#4c1d95; }

/* ══════════════════════════════════════════════
   JUEGO: ATRAPA LA ESTRELLA
══════════════════════════════════════════════ */
.star-arena        { position:relative; width:100%; height:320px; border-radius:20px; overflow:hidden; cursor:none; touch-action:none; }
.star-arena-adult  { background:linear-gradient(180deg,#0f172a 0%,#1e1b4b 100%); border:1px solid rgba(255,255,255,.1); }
.star-arena-child  { background:linear-gradient(180deg,#bfdbfe 0%,#c4b5fd 100%); border:2px solid rgba(139,92,246,.3); }
.star-el           { position:absolute; transform:translate(-50%,-50%); pointer-events:none; }
.bar-el            { position:absolute; height:16px; width:90px; border-radius:99px; transform:translateX(-50%); pointer-events:none; }
.bar-adult         { background:linear-gradient(90deg,#d97706,#fbbf24); box-shadow:0 0 20px rgba(217,119,6,.6); }
.bar-child         { background:linear-gradient(90deg,#8b5cf6,#ec4899); box-shadow:0 0 20px rgba(236,72,153,.5); }

/* ══════════════════════════════════════════════
   SETTINGS PILLS
══════════════════════════════════════════════ */
.pill               { padding:8px 16px; border-radius:99px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; border:none; }
.pill-active-adult  { background:linear-gradient(135deg,#d97706,#b45309); color:#000; }
.pill-inactive-adult{ background:rgba(255,255,255,.07); color:rgba(255,255,255,.5); }
.pill-inactive-adult:hover { background:rgba(255,255,255,.13); color:#fff; }
.pill-active-child  { background:linear-gradient(135deg,#8b5cf6,#ec4899); color:#fff; }
.pill-inactive-child{ background:rgba(139,92,246,.1); color:#7c3aed; }
.pill-inactive-child:hover { background:rgba(139,92,246,.2); }

/* ══════════════════════════════════════════════
   TACHISTOSCOPIO
══════════════════════════════════════════════ */
.tachy-display {
  width:180px; height:180px; display:flex; align-items:center; justify-content:center;
  border-radius:22px; font-size:90px; transition:all .1s; margin:0 auto;
  border:2px solid rgba(255,255,255,.12);
}
.tachy-adult { background:rgba(255,255,255,.06); }
.tachy-child { background:rgba(255,255,255,.6); }
.tachy-flash { background:rgba(255,255,255,.22) !important; transform:scale(1.08); }

/* ══════════════════════════════════════════════
   IMPRESIÓN — Reporte médico B&N
══════════════════════════════════════════════ */
.print-only { display:none; }

@media print {
  body                       { background:#fff !important; color:#000 !important; }
  .no-print                  { display:none  !important; }
  .print-only                { display:block !important; }
  .print-header              { display:flex  !important; align-items:center; gap:12px; margin-bottom:16px; border-bottom:2px solid #000; padding-bottom:12px; }
  .glass-dark, .glass-light  { background:#fff !important; border:1px solid #ccc !important; backdrop-filter:none !important; }
  *                          { color:#000 !important; box-shadow:none !important; }
  .hist-table th,
  .hist-table td             { border-color:#ccc !important; }
  .footer-bar, .header-bar   { display:none !important; }
}
</style>
</head>
<body>
<div id="root"></div>

<!--
  ORDEN DE CARGA — importante:
  1. constants.js  → datos, pools, instrucciones, utilidades
  2. screens.js    → Btn, MetricBadge, ProgressBar + todas las pantallas
  3. games.js      → los 10 juegos (usan Btn, MetricBadge, constantes)
  4. app.js        → hooks + App + ReactDOM.render
-->
<script type="text/babel" src="constants.js"></script>
<script type="text/babel" src="screens.js"></script>
<script type="text/babel" src="games.js"></script>
<script type="text/babel" src="app.js"></script>

</body>
</html>
